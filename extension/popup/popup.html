<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>FlixList</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
<div id="app">

  <!-- ── AUTH VIEW ── -->
  <div id="view-auth" class="view">
    <div class="logo-row">
      <svg class="logo-icon" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
      <span class="logo-text">Flix<span>List</span></span>
    </div>
    <p class="tagline">YouTube playlists,<br>but for Netflix.</p>

    <div id="auth-msg" class="auth-msg" style="display:none"></div>

    <!-- Sign in form -->
    <div id="signin-form">
      <div class="field-group"><input type="email"    id="email"    placeholder="Email"    autocomplete="email"           /></div>
      <div class="field-group"><input type="password" id="password" placeholder="Password" autocomplete="current-password" /></div>
      <button class="btn-primary" id="signin-btn">Sign In</button>
      <div class="auth-toggle">
        <span>Don't have an account?</span>
        <button class="link-btn" id="show-signup">Sign Up</button>
      </div>
    </div>

    <!-- Sign up form -->
    <div id="signup-form" style="display:none">
      <div class="field-group"><input type="text"     id="reg-username" placeholder="Username"        autocomplete="username"       /></div>
      <div class="field-group"><input type="email"    id="reg-email"    placeholder="Email"           autocomplete="email"          /></div>
      <div class="field-group"><input type="password" id="reg-password" placeholder="Password (6+)"  autocomplete="new-password"   /></div>
      <button class="btn-primary" id="signup-btn">Create Account</button>
      <div class="auth-toggle">
        <span>Already have an account?</span>
        <button class="link-btn" id="show-signin">Sign In</button>
      </div>
    </div>
  </div>

  <!-- ── MAIN VIEW ── -->
  <div id="view-main" class="view" style="display:none">

    <!-- Header -->
    <div class="header">
      <div class="logo-row">
        <svg class="logo-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        <span class="logo-text">Flix<span>List</span></span>
      </div>
      <div class="user-meta">
        <div class="avatar" id="avatar">U</div>
        <div class="user-text">
          <span class="user-name" id="display-name"></span>
          <span class="user-email" id="display-email"></span>
        </div>
        <button class="icon-btn" id="signout-btn" title="Sign out">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
            <polyline points="16 17 21 12 16 7"/>
            <line x1="21" y1="12" x2="9" y2="12"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Now watching -->
    <div id="current-item-section" style="display:none">
      <div class="section-label">NOW WATCHING</div>
      <div class="current-item">
        <div class="item-poster" id="current-poster"></div>
        <div class="item-info">
          <div class="item-title" id="current-title">—</div>
          <div class="item-sub"   id="current-sub"></div>
        </div>
      </div>
      <div class="section-label" style="margin-top:14px">SAVE TO</div>
      <div id="playlist-select-list"></div>
      <button class="btn-secondary" id="new-playlist-btn">+ New playlist</button>
    </div>

    <!-- Not on watch page -->
    <div id="not-watching-section">
      <div class="empty-state">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" style="color:#e5a00d;margin-bottom:10px">
          <rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/>
        </svg>
        <p>Open Netflix and start watching to save to a playlist.</p>
        <a class="btn-ghost" href="https://www.netflix.com" target="_blank">Go to Netflix →</a>
      </div>
    </div>

    <div class="divider"></div>
    <div class="section-label">MY PLAYLISTS</div>
    <div id="my-playlists-list" class="playlists-list"></div>
  </div>

  <!-- ── NEW PLAYLIST MODAL ── -->
  <div id="new-playlist-modal" class="modal" style="display:none">
    <div class="modal-inner">
      <div class="modal-header">
        <span>New Playlist</span>
        <button class="icon-btn" id="close-modal-btn">✕</button>
      </div>
      <input type="text" id="new-pl-title" placeholder="Playlist name…" class="modal-input" />
      <div id="new-pl-error" class="error-msg" style="display:none"></div>
      <div class="modal-actions">
        <button class="btn-ghost"    id="cancel-modal-btn">Cancel</button>
        <button class="btn-primary"  id="create-pl-btn">Create</button>
      </div>
    </div>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
