<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0f0f12;
      color: #e0e0e6;
    }
    .header {
      display: flex; align-items: center; gap: 10px;
      padding: 14px 16px; border-bottom: 1px solid #2a2a32;
    }
    .logo {
      width: 26px; height: 26px; background: #e50914; border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      color: white; font-weight: 800; font-size: 13px;
    }
    .brand { font-weight: 700; font-size: 15px; }
    .brand span { color: #e50914; }
    .content { padding: 16px; }
    label { display: block; font-size: 11px; color: #888; margin-bottom: 4px; font-weight: 500; }
    input {
      width: 100%; padding: 9px 12px; background: #1a1a1e; border: 1px solid #2a2a32;
      border-radius: 8px; color: #eee; font-size: 13px; outline: none; margin-bottom: 10px;
    }
    input:focus { border-color: #e50914; }
    .btn {
      width: 100%; padding: 10px; background: #e50914; color: white; border: none;
      border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; margin-bottom: 8px;
    }
    .btn:hover { background: #ff1a25; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .btn-ghost { background: transparent; border: 1px solid #2a2a32; color: #aaa; }
    .btn-ghost:hover { border-color: #555; color: #eee; }
    .toggle { text-align: center; font-size: 12px; color: #666; margin-top: 8px; }
    .toggle a { color: #e50914; cursor: pointer; text-decoration: none; }
    .msg { font-size: 12px; margin-bottom: 10px; padding: 8px 10px; border-radius: 6px; display: none; line-height: 1.4; }
    .msg.error { background: rgba(239,68,68,0.1); border: 1px solid rgba(239,68,68,0.2); color: #f87171; display: block; }
    .msg.success { background: rgba(45,212,160,0.1); border: 1px solid rgba(45,212,160,0.2); color: #2dd4a0; display: block; }
    .user-info {
      display: flex; align-items: center; gap: 10px;
      padding: 12px; margin-bottom: 12px; background: #1a1a1e; border-radius: 8px;
    }
    .avatar {
      width: 32px; height: 32px; border-radius: 50%; background: #e50914;
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; font-size: 14px; color: white; flex-shrink: 0;
    }
    .user-name { font-weight: 600; font-size: 13px; }
    .user-email { font-size: 11px; color: #666; word-break: break-all; }
    .hint { font-size: 11px; color: #555; line-height: 1.5; margin-bottom: 12px; }
    .hint strong { color: #e50914; }
  </style>
</head>
<body>
  <div class="header">
    <div class="logo">F</div>
    <div class="brand">Flix<span>List</span></div>
  </div>

  <div class="content">
    <div id="msg"></div>

    <div id="signed-out" style="display:none">
      <div id="signin-form">
        <label>Email</label>
        <input type="email" id="email" placeholder="you@example.com" />
        <label>Password</label>
        <input type="password" id="password" placeholder="••••••••" />
        <button class="btn" id="signin-btn">Sign In</button>
        <div class="toggle">No account? <a id="show-signup">Sign up</a></div>
      </div>
      <div id="signup-form" style="display:none">
        <label>Username</label>
        <input type="text" id="reg-username" placeholder="kramer_fan" />
        <label>Email</label>
        <input type="email" id="reg-email" placeholder="you@example.com" />
        <label>Password</label>
        <input type="password" id="reg-password" placeholder="6+ characters" />
        <button class="btn" id="signup-btn">Create Account</button>
        <div class="toggle">Have an account? <a id="show-signin">Sign in</a></div>
      </div>
    </div>

    <div id="signed-in" style="display:none">
      <div class="user-info">
        <div class="avatar" id="avatar">?</div>
        <div>
          <div class="user-name" id="display-name">User</div>
          <div class="user-email" id="display-email"></div>
        </div>
      </div>
      <p class="hint">
        On any Netflix page, click the <strong>FlixList</strong> button in the bottom-right to save moments and browse your playlists.
      </p>
      <button class="btn btn-ghost" id="signout-btn">Sign Out</button>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
