<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    * { margin:0; padding:0; box-sizing:border-box; }
    body { width:300px; font-family:'Netflix Sans','Helvetica Neue',Helvetica,Arial,sans-serif; background:#141414; color:#e5e5e5; }
    .header { display:flex; align-items:center; gap:10px; padding:14px 16px; border-bottom:1px solid #333; }
    .logo { color:#e50914; font-weight:900; font-size:16px; letter-spacing:-0.5px; }
    .content { padding:16px; }
    label { display:block; font-size:13px; color:#8c8c8c; margin-bottom:4px; }
    input { width:100%; padding:10px 12px; background:#333; border:1px solid #454545; border-radius:4px; color:#fff; font-size:14px; outline:none; margin-bottom:12px; }
    input:focus { border-color:#e50914; }
    .btn { width:100%; padding:10px; background:#e50914; color:#fff; border:none; border-radius:4px; font-size:14px; font-weight:600; cursor:pointer; margin-bottom:8px; }
    .btn:hover { background:#f6121d; }
    .btn:disabled { opacity:.5; cursor:not-allowed; }
    .btn-ghost { background:transparent; border:1px solid #454545; color:#8c8c8c; }
    .btn-ghost:hover { border-color:#e5e5e5; color:#e5e5e5; }
    .toggle { text-align:center; font-size:13px; color:#8c8c8c; margin-top:10px; }
    .toggle a { color:#e50914; cursor:pointer; text-decoration:none; }
    .msg { font-size:13px; margin-bottom:10px; padding:8px 10px; border-radius:4px; display:none; line-height:1.4; }
    .msg.error { background:rgba(229,9,20,.15); border:1px solid rgba(229,9,20,.3); color:#e87c03; display:block; }
    .msg.success { background:rgba(46,204,113,.15); border:1px solid rgba(46,204,113,.3); color:#2ecc71; display:block; }
    .user-info { display:flex; align-items:center; gap:10px; padding:12px; margin-bottom:12px; background:#222; border-radius:4px; }
    .avatar { width:32px; height:32px; border-radius:4px; background:#e50914; display:flex; align-items:center; justify-content:center; font-weight:700; font-size:14px; color:#fff; flex-shrink:0; }
    .user-name { font-weight:600; font-size:14px; }
    .user-email { font-size:12px; color:#8c8c8c; }
    .hint { font-size:12px; color:#8c8c8c; line-height:1.5; margin-bottom:12px; }
  </style>
</head>
<body>
  <div class="header"><div class="logo">FLIXLIST</div></div>
  <div class="content">
    <div id="msg"></div>
    <div id="signed-out" style="display:none">
      <div id="signin-form">
        <label>Email</label><input type="email" id="email" placeholder="you@example.com" />
        <label>Password</label><input type="password" id="password" placeholder="Password" />
        <button class="btn" id="signin-btn">Sign In</button>
        <div class="toggle">New here? <a id="show-signup">Sign up</a></div>
      </div>
      <div id="signup-form" style="display:none">
        <label>Username</label><input type="text" id="reg-username" placeholder="Your name" />
        <label>Email</label><input type="email" id="reg-email" placeholder="you@example.com" />
        <label>Password</label><input type="password" id="reg-password" placeholder="6+ characters" />
        <button class="btn" id="signup-btn">Sign Up</button>
        <div class="toggle">Already a member? <a id="show-signin">Sign in</a></div>
      </div>
    </div>
    <div id="signed-in" style="display:none">
      <div class="user-info">
        <div class="avatar" id="avatar">?</div>
        <div><div class="user-name" id="display-name">User</div><div class="user-email" id="display-email"></div></div>
      </div>
      <p class="hint">Look for the <strong style="color:#e50914">FLIXLIST</strong> button on Netflix to save and browse playlists.</p>
      <button class="btn btn-ghost" id="signout-btn">Sign Out</button>
    </div>
  </div>
  <script src="popup.js"></script>
</body>
</html>
